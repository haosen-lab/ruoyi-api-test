[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录模块
    user: 用户管理模块
    role: 角色管理模块
    menu: 菜单管理模块
    dept: 部门管理模块
    dict: 字典管理模块
    config: 参数配置模块
    notice: 通知公告模块
    post: 岗位管理模块
    monitor: 系统监控模块
    security: 安全测试
    boundary: 边界值测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
